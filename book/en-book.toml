[book]
title = "pi-atelier: AI Agent Toolkit Practical Guide"
authors = ["pi-atelier contributors"]
language = "en"
description = "A practical guide to using the pi-atelier extension ecosystem, evolving AI coding assistants from 'can write code' to 'can manage projects'"
src = "src/en"

[build]
build-dir = "book-en"

[output.html]
default-theme = "rust"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/catlain/pi-atelier"
edit-url-template = "https://github.com/catlain/pi-atelier/edit/main/book/src/en/{path}"
additional-css = ["theme/custom.css"]
additional-js = ["theme/custom.js"]
site-url = "/pi-atelier/en/"

[output.html.print]
enable = true
