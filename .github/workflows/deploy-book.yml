name: Deploy mdBook

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=bin
          echo "$PWD/bin" >> $GITHUB_PATH

      # Build Chinese version (default)
      - name: Build Chinese book
        run: |
          cd book
          mdbook build

      # Build English version (swap book.toml)
      - name: Build English book
        run: |
          cd book
          cp book.toml book.toml.zh
          cp en-book.toml book.toml
          mdbook build
          cp book.toml.zh book.toml
          rm book.toml.zh

      # Merge: Chinese at root, English at /en/
      - name: Merge both versions
        run: |
          mkdir -p merged/en
          cp -r book/book/* merged/
          cp -r book/book-en/* merged/en/

      # Add language switcher to ALL pages (not just index)
      - name: Add language links
        run: |
          LANG_BTN_STYLE='position:fixed;bottom:10px;right:10px;background:#4a90d9;padding:6px 14px;border-radius:16px;z-index:100;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.3)'
          LANG_LINK_STYLE='color:#fff;text-decoration:none;font-weight:bold'
          # Chinese pages: link to /pi-atelier/en/
          find merged -name '*.html' -not -path 'merged/en/*' | while read f; do
            sed -i "s|</body>|<div style=\"${LANG_BTN_STYLE}\"><a href=\"/pi-atelier/en/\" style=\"${LANG_LINK_STYLE}\">English</a></div></body>|" "$f"
          done
          # English pages: link to /pi-atelier/
          find merged/en -name '*.html' | while read f; do
            sed -i "s|</body>|<div style=\"${LANG_BTN_STYLE}\"><a href=\"/pi-atelier/\" style=\"${LANG_LINK_STYLE}\">中文</a></div></body>|" "$f"
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: merged
          publish_branch: gh-pages
